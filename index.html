<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Posty — Latest Posts</title>
  <style>
    body { font-family: Arial, Helvetica, sans-serif; max-width: 720px; margin: 40px auto; padding: 0 16px; }
    h1 { margin-bottom: 0.2em }
    .post { border-bottom: 1px solid #eee; padding: 12px 0 }
    .meta { color: #666; font-size: 0.9em }
  </style>
</head>
<body>
  <h1>Posty — Latest Posts</h1>
  <div id="posts">Loading posts…</div>

  <script>
    async function load() {
      try {
        const res = await fetch('/api/posts');
        const posts = await res.json();
        const container = document.getElementById('posts');
        if (!posts.length) { container.textContent = 'No posts found.'; return }
        container.innerHTML = '';
        posts.forEach(p => {
          const el = document.createElement('div'); el.className = 'post';
          const title = document.createElement('div');
          title.innerHTML = `<a href="${p.url}">${p.title}</a>`;
          const meta = document.createElement('div'); meta.className = 'meta';
          meta.textContent = `${p.author || 'Unknown'} — ${p.date || p.filename}`;
          el.appendChild(title); el.appendChild(meta);
          container.appendChild(el);
        })
      } catch (e) {
        document.getElementById('posts').textContent = 'Failed to load posts: ' + e.message;
      }
    }
    load();
  </script>
</body>
</html>
